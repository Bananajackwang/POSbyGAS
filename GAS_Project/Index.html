<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="點餐系統">
    <title>Modern POS System</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <?!= include('style'); ?>
</head>
<body>
    <div class="app-container">
        <!-- 網路狀態指示列 -->
        <div id="network-status" class="network-status hidden">
            <span class="status-icon">🔴</span>
            <span class="status-text">目前離線</span>
            <span class="offline-count" id="offline-count"></span>
        </div>
        <!-- 左側：主要內容區 (商品與分類) -->
        <main class="main-content">
            <header class="header">
                <h1>點餐系統</h1>
                <div class="header-actions">
                    <button type="button" class="report-btn" id="report-btn">📊 營業報表</button>
                    <button type="button" class="history-btn" id="history-btn">📋 銷售紀錄</button>
                </div>
            </header>
            
            <section class="product-grid" id="product-grid">
                <!-- 商品卡片由 JS 動態產生 -->
            </section>
        </main>

        <!-- 右側：購物車與結帳區 -->
        <aside class="cart-sidebar">
            <div class="cart-header">
                <h2>購物明細</h2>
                <button type="button" class="clear-cart-btn" id="clear-cart-btn">清空</button>
            </div>
            
            <div class="cart-items" id="cart-items">
                <!-- 購物車項目由 JS 動態產生 -->
                <div class="empty-cart-message">尚未選擇任何商品</div>
            </div>
            
            <div class="cart-footer">

                <div class="total-section">
                    <span>總計金額</span>
                    <span class="total-amount" id="total-amount">$0</span>
                </div>
                
                <button type="button" class="checkout-btn" id="checkout-btn" disabled>
                    結帳
                </button>
            </div>
        </aside>
    </div>

    <!-- 結帳彈出視窗 (Modal) -->
    <dialog id="checkout-modal" class="modal">
        <div class="modal-content">
            <h2>結帳</h2>
            
            <div class="checkout-details">

                <div class="detail-row total-row">
                    <span>應付總額：</span>
                    <span id="modal-total-amount" class="highlight-total">$0</span>
                </div>
                <div class="discount-section">
                    <button type="button" class="discount-btn" data-type="percent" data-value="90">9折</button>
                    <button type="button" class="discount-btn" data-type="percent" data-value="80">8折</button>
                    <button type="button" class="discount-btn" data-type="amount" data-value="10">-10元</button>
                    <button type="button" class="discount-btn" data-type="amount" data-value="50">-50元</button>
                    <button type="button" class="discount-btn discount-clear" id="clear-discount-btn" style="display:none;">取消折扣</button>
                </div>
            </div>

            <div class="payment-section">
                <label for="tendered-amount">收現金額：</label>
                <div class="input-group">
                    <span class="currency-symbol">$</span>
                    <input type="number" id="tendered-amount" placeholder="0" min="0" readonly>
                </div>
                
                <div class="numpad-container">
                    <div class="numpad">
                        <button type="button" class="numpad-btn" data-key="1">1</button>
                        <button type="button" class="numpad-btn" data-key="2">2</button>
                        <button type="button" class="numpad-btn" data-key="3">3</button>
                        <button type="button" class="numpad-btn" data-key="4">4</button>
                        <button type="button" class="numpad-btn" data-key="5">5</button>
                        <button type="button" class="numpad-btn" data-key="6">6</button>
                        <button type="button" class="numpad-btn" data-key="7">7</button>
                        <button type="button" class="numpad-btn" data-key="8">8</button>
                        <button type="button" class="numpad-btn" data-key="9">9</button>
                        <button type="button" class="numpad-btn numpad-clear" data-key="C">清除</button>
                        <button type="button" class="numpad-btn" data-key="0">0</button>
                        <button type="button" class="numpad-btn numpad-back" data-key="BACK">⌫</button>
                    </div>
                    <div class="quick-amounts-vertical">
                        <button type="button" class="quick-btn" data-amount="100">+100</button>
                        <button type="button" class="quick-btn" data-amount="500">+500</button>
                        <button type="button" class="quick-btn" data-amount="1000">+1000</button>
                        <button type="button" class="quick-btn" data-amount="exact">剛好</button>
                    </div>
                </div>
            </div>

            <div class="change-section">
                <span>找零：</span>
                <span id="modal-change-amount" class="change-amount">$0</span>
            </div>

            <form method="dialog" class="modal-actions">
                <button value="cancel" class="cancel-btn" id="modal-cancel-btn">取消</button>
                <button value="confirm" class="confirm-btn" id="modal-confirm-btn">完成結帳</button>
            </form>
        </div>
    </dialog>

    <!-- 銷售紀錄彈出視窗 -->
    <dialog id="history-modal" class="modal history-modal">
        <div class="modal-content">
            <div class="history-header">
                <h2>銷售紀錄 (最新 50 筆)</h2>
                <button type="button" class="close-history-btn" id="close-history-btn">✕</button>
            </div>
            
            <div class="history-list" id="history-list">
                <div class="loading-message">載入中...</div>
            </div>
        </div>
    </dialog>

    <!-- 營業報表彈出視窗 -->
    <dialog id="report-modal" class="modal report-modal">
        <div class="modal-content">
            <div class="report-header">
                <div>
                    <h2>營業報表 (Daily Sales Report)</h2>
                    <div class="report-date" id="report-date-display">今日</div>
                </div>
                <button type="button" class="close-report-btn" id="close-report-btn">✕</button>
            </div>
            
            <div class="report-body" id="report-body">
                <!-- 載入中畫面 -->
                <div id="report-loading" class="loading-message">載入數據中...</div>
                
                <div id="report-dashboard" class="report-dashboard hidden">
                    <!-- KPI Cards -->
                    <div class="kpi-grid">
                        <div class="kpi-card">
                            <div class="kpi-title">總營業額 (TOTAL SALES)</div>
                            <div class="kpi-value highlight-total" id="kpi-total-sales">$0</div>
                        </div>
                        <div class="kpi-card">
                            <div class="kpi-title">總訂單數 (TOTAL ORDERS)</div>
                            <div class="kpi-value" id="kpi-total-orders">0</div>
                        </div>
                        <div class="kpi-card">
                            <div class="kpi-title">平均客單價 (AVG ORDER VALUE)</div>
                            <div class="kpi-value" id="kpi-avg-order">$0</div>
                        </div>
                    </div>
                    
                    <!-- Sales Trend Chart -->
                    <div class="chart-container trend-chart-container">
                        <h3>營業趨勢 (SALES TREND)</h3>
                        <div style="position: relative; height: 250px; width: 100%;">
                            <canvas id="trend-chart"></canvas>
                        </div>
                    </div>
                    
                    <!-- Bottom Charts -->
                    <div class="bottom-charts-grid">
                        <div class="chart-container">
                            <h3>熱銷商品排行 (TOP ITEMS)</h3>
                            <div class="top-items-list" id="top-items-list">
                                <!-- 動態產生排行 -->
                            </div>
                        </div>
                        <div class="chart-container">
                            <h3>銷售佔比 (SALES SHARE)</h3>
                            <div style="position: relative; height: 200px; width: 100%;">
                                <canvas id="category-chart"></canvas>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </dialog>

    <?!= include('script'); ?>
</body>
</html>
