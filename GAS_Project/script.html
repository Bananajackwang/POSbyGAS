<script>
// 全域錯誤監聽 (方便除錯 GAS 上的錯誤)
window.onerror = function(msg, url, lineNo, columnNo, error) {
    alert('發生錯誤: ' + msg + '\n行號: ' + lineNo);
    return false;
};

// 狀態管理
const state = {
    activeCategory: null,
    cart: [], // { product, quantity }
    discount: { type: null, value: 0 }
};

let MOCK_DATA = { categories: [], products: [] };

// DOM 元素
const els = {
    productGrid: document.getElementById('product-grid'),
    cartItems: document.getElementById('cart-items'),
    totalAmount: document.getElementById('total-amount'),
    checkoutBtn: document.getElementById('checkout-btn'),
    clearCartBtn: document.getElementById('clear-cart-btn'),
    
    // Modal
    modal: document.getElementById('checkout-modal'),
    modalTotalAmount: document.getElementById('modal-total-amount'),
    tenderedAmount: document.getElementById('tendered-amount'),
    modalChangeAmount: document.getElementById('modal-change-amount'),
    modalConfirmBtn: document.getElementById('modal-confirm-btn'),
    quickBtns: document.querySelectorAll('.quick-btn'),
    discountBtns: document.querySelectorAll('.discount-btn'),
    clearDiscountBtn: document.getElementById('clear-discount-btn'),
    
    // History
    historyBtn: document.getElementById('history-btn'),
    historyModal: document.getElementById('history-modal'),
    closeHistoryBtn: document.getElementById('close-history-btn'),
    historyList: document.getElementById('history-list'),
    
    // Network Status
    networkStatus: document.getElementById('network-status'),
    statusIcon: document.querySelector('.status-icon'),
    statusText: document.querySelector('.status-text'),
    offlineCount: document.getElementById('offline-count'),
    
    // Report
    reportBtn: document.getElementById('report-btn'),
    reportModal: document.getElementById('report-modal'),
    closeReportBtn: document.getElementById('close-report-btn'),
    reportLoading: document.getElementById('report-loading'),
    reportDashboard: document.getElementById('report-dashboard'),
    kpiTotalSales: document.getElementById('kpi-total-sales'),
    kpiTotalOrders: document.getElementById('kpi-total-orders'),
    kpiAvgOrder: document.getElementById('kpi-avg-order'),
    topItemsList: document.getElementById('top-items-list'),
    reportDateDisplay: document.getElementById('report-date-display')
};

let trendChartInstance = null;
let categoryChartInstance = null;

// 初始化
function init() {
    els.productGrid.innerHTML = '<div class="empty-cart-message">正在載入商品資料...</div>';
    
    updateNetworkUI();
    window.addEventListener('online', () => {
        updateNetworkUI();
        syncOfflineOrders();
    });
    window.addEventListener('offline', updateNetworkUI);
    
    if (typeof google === 'undefined') {
        console.log('Local environment detected. Using mock data.');
        setTimeout(() => {
            initData({
                categories: ['主食', '飲料'],
                products: [
                    { id: '1', name: '招牌便當', price: 100, category: '主食' },
                    { id: '2', name: '排骨便當', price: 110, category: '主食' },
                    { id: '3', name: '紅茶', price: 30, category: '飲料' }
                ]
            });
        }, 500);
        return;
    }
    
    if (!navigator.onLine) {
        // 離線狀態，嘗試載入快取資料
        const cached = localStorage.getItem('pos_cached_data');
        if (cached) {
            initData(JSON.parse(cached));
        } else {
            els.productGrid.innerHTML = '<div class="empty-cart-message" style="color: var(--danger)">無網路且無本地快取資料，請連線後重試。</div>';
        }
        return;
    }
    
    // 透過 GAS API 取得試算表資料
    google.script.run
        .withSuccessHandler(initData)
        .withFailureHandler(err => {
            const cached = localStorage.getItem('pos_cached_data');
            if (cached) {
                initData(JSON.parse(cached));
            } else {
                alert('載入資料失敗且無快取：' + err);
            }
        })
        .getInitialData();
        
    // 啟動時如果有網路，也嘗試同步
    if (navigator.onLine) {
        syncOfflineOrders();
    }
}

function initData(data) {
    MOCK_DATA = data;
    try {
        localStorage.setItem('pos_cached_data', JSON.stringify(data));
    } catch (e) {
        console.warn('無法儲存快取:', e);
    }
    renderProducts();
    setupEventListeners();
}

// --- 離線同步相關函式 ---
function getOfflineOrders() {
    try {
        const stored = localStorage.getItem('pos_offline_orders');
        return stored ? JSON.parse(stored) : [];
    } catch (e) {
        return [];
    }
}

function saveOfflineOrder(orderData) {
    const orders = getOfflineOrders();
    orders.push(orderData);
    localStorage.setItem('pos_offline_orders', JSON.stringify(orders));
    updateNetworkUI();
}

function clearOfflineOrders() {
    localStorage.removeItem('pos_offline_orders');
    updateNetworkUI();
}

function updateNetworkUI() {
    const isOnline = navigator.onLine;
    const offlineOrders = getOfflineOrders();
    const count = offlineOrders.length;
    
    if (!isOnline) {
        els.networkStatus.className = 'network-status'; // show
        els.statusIcon.textContent = '🔴';
        els.statusText.textContent = '目前離線';
        els.offlineCount.textContent = count > 0 ? `(未同步: ${count} 筆)` : '';
        els.offlineCount.style.display = count > 0 ? 'inline-block' : 'none';
    } else {
        if (count > 0) {
            els.networkStatus.className = 'network-status syncing'; // show syncing state
            els.statusIcon.textContent = '⏳';
            els.statusText.textContent = '網路已恢復，等待同步中...';
            els.offlineCount.textContent = `(待同步: ${count} 筆)`;
            els.offlineCount.style.display = 'inline-block';
        } else {
            els.networkStatus.className = 'network-status hidden'; // hide
        }
    }
}

let isSyncing = false;
function syncOfflineOrders() {
    if (!navigator.onLine || isSyncing) return;
    
    const orders = getOfflineOrders();
    if (orders.length === 0) return;
    
    isSyncing = true;
    els.networkStatus.className = 'network-status syncing';
    els.statusIcon.textContent = '🔄';
    els.statusText.textContent = '同步資料中...';
    
    if (typeof google === 'undefined') {
        setTimeout(() => {
            clearOfflineOrders();
            isSyncing = false;
            updateNetworkUI();
            console.log('本地測試：已清空離線訂單');
        }, 1500);
        return;
    }
    
    google.script.run
        .withSuccessHandler(() => {
            clearOfflineOrders();
            isSyncing = false;
            
            // 顯示成功訊息一下再隱藏
            els.networkStatus.className = 'network-status online';
            els.statusIcon.textContent = '🟢';
            els.statusText.textContent = '同步完成';
            els.offlineCount.style.display = 'none';
            setTimeout(() => {
                updateNetworkUI();
            }, 3000);
        })
        .withFailureHandler(err => {
            console.error('同步失敗:', err);
            isSyncing = false;
            updateNetworkUI();
        })
        .submitBulkOrders(orders);
}

// 渲染商品網格 (顯示所有分類)
function renderProducts() {
    let html = '';
    MOCK_DATA.categories.forEach(cat => {
        const catProducts = MOCK_DATA.products.filter(p => p.category === cat);
        if (catProducts.length > 0) {
            html += `<div class="category-header"><h3>${cat}</h3></div>`;
            catProducts.forEach(p => {
                html += `
                    <div class="product-card" data-id="${p.id}">
                        <div class="product-name">${p.name}</div>
                        <div class="product-price">$${p.price}</div>
                    </div>
                `;
            });
        }
    });
    els.productGrid.innerHTML = html;
}

// 渲染購物車
function renderCart() {
    if (state.cart.length === 0) {
        els.cartItems.innerHTML = `<div class="empty-cart-message">尚未選擇任何商品</div>`;
        els.totalAmount.textContent = '$0';
        updateCheckoutBtnState();
        return;
    }

    let total = 0;
    els.cartItems.innerHTML = state.cart.map((item, index) => {
        const itemTotal = item.product.price * item.quantity;
        total += itemTotal;
        return `
            <div class="cart-item">
                <div class="cart-item-name">${item.product.name}</div>
                <div class="cart-item-price">$${item.product.price} / 單價</div>
                <div class="cart-item-actions">
                    <button class="qty-btn ${item.quantity === 1 ? 'remove' : ''}" onclick="updateQuantity(${index}, -1)">
                        ${item.quantity === 1 ? '🗑️' : '-'}
                    </button>
                    <span class="item-qty">${item.quantity}</span>
                    <button class="qty-btn" onclick="updateQuantity(${index}, 1)">+</button>
                </div>
            </div>
        `;
    }).join('');

    els.totalAmount.textContent = `$${total}`;
    updateCheckoutBtnState();
    
    // 捲動到底部
    els.cartItems.scrollTop = els.cartItems.scrollHeight;
}

function updateCheckoutBtnState() {
    els.checkoutBtn.disabled = state.cart.length === 0;
}

// 購物車操作
function addToCart(productId) {
    const product = MOCK_DATA.products.find(p => p.id === productId);
    if (!product) return;

    const existingItemIndex = state.cart.findIndex(item => item.product.id === productId);
    
    if (existingItemIndex > -1) {
        state.cart[existingItemIndex].quantity += 1;
    } else {
        state.cart.push({ product, quantity: 1 });
    }
    
    renderCart();
}

window.updateQuantity = function(index, delta) {
    if (state.cart[index]) {
        state.cart[index].quantity += delta;
        if (state.cart[index].quantity <= 0) {
            state.cart.splice(index, 1);
        }
        renderCart();
    }
};

function clearCart() {
    state.cart = [];
    renderCart();
}

function getTotalAmount() {
    return state.cart.reduce((sum, item) => sum + (item.product.price * item.quantity), 0);
}

function getDiscountedTotal() {
    const total = getTotalAmount();
    if (!state.discount.type) return total;
    
    if (state.discount.type === 'percent') {
        return Math.round(total * (state.discount.value / 100));
    } else if (state.discount.type === 'amount') {
        return Math.max(0, total - state.discount.value);
    }
    return total;
}

// 結帳邏輯
function openCheckoutModal() {
    state.discount = { type: null, value: 0 };
    updateDiscountUI();
    
    els.tenderedAmount.value = '';
    updateModalTotalDisplay();
    els.modal.showModal();
}

function updateModalTotalDisplay() {
    const total = getDiscountedTotal();
    els.modalTotalAmount.textContent = `$${total}`;
    updateChange();
}

function updateDiscountUI() {
    els.discountBtns.forEach(btn => {
        btn.classList.remove('active');
        if (state.discount.type && 
            btn.dataset.type === state.discount.type && 
            parseInt(btn.dataset.value) === state.discount.value) {
            btn.classList.add('active');
        }
    });
    
    els.clearDiscountBtn.style.display = state.discount.type ? 'inline-block' : 'none';
}

function updateChange() {
    const total = getDiscountedTotal();
    const tendered = parseInt(els.tenderedAmount.value) || 0;
    
    if (els.tenderedAmount.value === '') {
        els.modalChangeAmount.textContent = '$0';
        els.modalChangeAmount.className = 'change-amount';
        els.modalConfirmBtn.disabled = false;
        return;
    }

    const change = tendered - total;
    
    if (change < 0) {
        els.modalChangeAmount.textContent = `-$${Math.abs(change)} (金額不足)`;
        els.modalChangeAmount.className = 'change-amount negative';
        els.modalConfirmBtn.disabled = true;
    } else {
        els.modalChangeAmount.textContent = `$${change}`;
        els.modalChangeAmount.className = 'change-amount';
        els.modalConfirmBtn.disabled = false;
    }
}

// 歷史紀錄邏輯
function openHistoryModal() {
    try {
        els.historyList.innerHTML = '<div class="loading-message">載入中...</div>';
        
        // 兼容舊版瀏覽器的 showModal
        if (typeof els.historyModal.showModal === 'function') {
            els.historyModal.showModal();
        } else {
            els.historyModal.setAttribute('open', '');
        }
        
        const offlineOrders = getOfflineOrders();
        let offlineHtml = '';
        if (offlineOrders.length > 0) {
            offlineHtml = offlineOrders.map(record => {
                const detailsString = record.items.map(item => 
                    `${item.name} x ${item.quantity} ($${item.subtotal})`
                ).join('\n');
                return `
                    <div class="history-item" style="border-left: 4px solid var(--danger);">
                        <div class="history-item-header">
                            <span>時間：${record.timestamp} (未同步)</span>
                            <span class="void-status" style="background: var(--danger); color: white;">排隊中</span>
                        </div>
                        <div class="history-item-total">總計：$${record.totalAmount}</div>
                        <div class="history-item-details">${detailsString}</div>
                    </div>
                `;
            }).join('') + '<hr style="margin: 1rem 0; border: none; border-top: 1px dashed var(--border);">';
            
            els.historyList.innerHTML = offlineHtml + '<div class="loading-message">載入歷史紀錄中...</div>';
        }
        
        if (typeof google === 'undefined') {
            setTimeout(() => {
                const mockHistory = [{ timestamp: new Date().toLocaleString(), staff: '店員A', totalAmount: 130, details: '招牌便當 x1, 紅茶 x1' }];
                renderHistory(mockHistory, offlineHtml);
            }, 500);
            return;
        }
        
        if (!navigator.onLine) {
            els.historyList.innerHTML = offlineHtml + '<div class="loading-message">目前離線，無法取得雲端歷史紀錄。</div>';
            return;
        }
        
        // 檢查後端函數是否存在 (避免因為沒更新部署導致 undefined error)
        if (typeof google.script.run.getSalesHistory !== 'function') {
            alert('找不到後端函式 getSalesHistory，請確認您已經「新增部署」或正在使用 /dev 測試網址。');
            return;
        }
        
        google.script.run
            .withSuccessHandler(history => renderHistory(history, offlineHtml))
            .withFailureHandler(err => {
                els.historyList.innerHTML = offlineHtml + `<div class="loading-message" style="color: var(--danger)">載入雲端紀錄失敗：${err}</div>`;
            })
            .getSalesHistory();
    } catch (err) {
        alert('開啟視窗發生錯誤：' + err.message);
    }
}

// --- 報表邏輯 ---
function openReportModal() {
    try {
        if (typeof els.reportModal.showModal === 'function') {
            els.reportModal.showModal();
        } else {
            els.reportModal.setAttribute('open', '');
        }
        
        els.reportLoading.style.display = 'block';
        els.reportDashboard.classList.add('hidden');
        
        if (typeof google === 'undefined') {
            setTimeout(() => {
                const mockData = {
                    date: new Date().toLocaleDateString('zh-TW'),
                    totalSales: 12850,
                    totalOrders: 342,
                    averageOrderValue: 37,
                    hourlySales: { '08': 200, '09': 500, '10': 600, '11': 450, '12': 900, '13': 750, '14': 800, '15': 1450, '16': 1200 },
                    topItems: [
                        { name: '冰拿鐵', qty: 26, amount: 2850 },
                        { name: '可頌', qty: 12, amount: 1450 },
                        { name: '經典牛肉堡', qty: 7, amount: 1000 },
                        { name: '酪梨吐司', qty: 3, amount: 500 }
                    ]
                };
                renderReport(mockData);
            }, 800);
            return;
        }
        
        if (!navigator.onLine) {
            els.reportLoading.innerHTML = '<span style="color: var(--danger)">目前離線，無法取得最新報表資料。</span>';
            return;
        }
        
        if (typeof google.script.run.getDailyReportData !== 'function') {
            els.reportLoading.innerHTML = '<span style="color: var(--danger)">找不到後端函式 getDailyReportData，請確認已更新部署。</span>';
            return;
        }
        
        google.script.run
            .withSuccessHandler(renderReport)
            .withFailureHandler(err => {
                els.reportLoading.innerHTML = `<span style="color: var(--danger)">載入報表失敗：${err}</span>`;
            })
            .getDailyReportData(); // 預設抓今日
    } catch (err) {
        alert('開啟報表發生錯誤：' + err.message);
    }
}

function renderReport(data) {
    if (!data) {
        els.reportLoading.innerHTML = '今日尚無結帳紀錄，無法產生報表。';
        return;
    }
    
    els.reportLoading.style.display = 'none';
    els.reportDashboard.classList.remove('hidden');
    
    els.reportDateDisplay.textContent = data.date;
    els.kpiTotalSales.textContent = `$${data.totalSales.toLocaleString()}`;
    els.kpiTotalOrders.textContent = data.totalOrders.toLocaleString();
    els.kpiAvgOrder.textContent = `$${data.averageOrderValue.toLocaleString()}`;
    
    // Render Top Items List
    els.topItemsList.innerHTML = data.topItems.map(item => `
        <div class="top-item-row">
            <div class="top-item-name">${item.name}</div>
            <div class="top-item-qty">${item.qty} 份</div>
            <div class="top-item-sales">$${item.amount.toLocaleString()}</div>
        </div>
    `).join('');
    
    // Draw Charts
    drawTrendChart(data.hourlySales);
    drawCategoryChart(data.topItems);
}

function drawTrendChart(hourlySales) {
    const ctx = document.getElementById('trend-chart');
    if (!ctx) return;
    
    // 整理 08:00 到 22:00 的資料 (或根據實際資料的範圍)
    const hours = Array.from({length: 15}, (_, i) => (i + 8).toString().padStart(2, '0'));
    const labels = hours.map(h => `${h}:00`);
    const dataPoints = hours.map(h => hourlySales[h] || 0);
    
    if (trendChartInstance) {
        trendChartInstance.destroy();
    }
    
    trendChartInstance = new Chart(ctx, {
        type: 'line',
        data: {
            labels: labels,
            datasets: [{
                label: '營業額 ($)',
                data: dataPoints,
                borderColor: '#38BDF8',
                backgroundColor: 'rgba(56, 189, 248, 0.2)',
                borderWidth: 3,
                pointBackgroundColor: '#111827',
                pointBorderColor: '#38BDF8',
                pointBorderWidth: 2,
                pointRadius: 4,
                fill: true,
                tension: 0.4
            }]
        },
        options: {
            responsive: true,
            maintainAspectRatio: false,
            plugins: {
                legend: { display: false },
                tooltip: {
                    mode: 'index',
                    intersect: false,
                    backgroundColor: 'rgba(17, 24, 39, 0.9)',
                    titleColor: '#F3F4F6',
                    bodyColor: '#38BDF8',
                    borderColor: 'rgba(255,255,255,0.1)',
                    borderWidth: 1
                }
            },
            scales: {
                x: {
                    grid: { color: 'rgba(255, 255, 255, 0.05)' },
                    ticks: { color: '#9CA3AF' }
                },
                y: {
                    grid: { color: 'rgba(255, 255, 255, 0.05)' },
                    ticks: { color: '#9CA3AF', callback: (val) => '$' + val }
                }
            }
        }
    });
}

function drawCategoryChart(topItems) {
    const ctx = document.getElementById('category-chart');
    if (!ctx) return;
    
    if (categoryChartInstance) {
        categoryChartInstance.destroy();
    }
    
    // 取前 5 名，剩下的歸為「其他」
    let labels = [];
    let dataPoints = [];
    let otherAmount = 0;
    
    topItems.forEach((item, index) => {
        if (index < 5) {
            labels.push(item.name);
            dataPoints.push(item.amount);
        } else {
            otherAmount += item.amount;
        }
    });
    
    if (otherAmount > 0) {
        labels.push('其他');
        dataPoints.push(otherAmount);
    }
    
    categoryChartInstance = new Chart(ctx, {
        type: 'doughnut',
        data: {
            labels: labels,
            datasets: [{
                data: dataPoints,
                backgroundColor: [
                    '#38BDF8', '#34D399', '#A78BFA', '#F472B6', '#FBBF24', '#9CA3AF'
                ],
                borderWidth: 0,
                hoverOffset: 4
            }]
        },
        options: {
            responsive: true,
            maintainAspectRatio: false,
            cutout: '70%',
            plugins: {
                legend: {
                    position: 'right',
                    labels: { color: '#D1D5DB', usePointStyle: true, boxWidth: 8 }
                },
                tooltip: {
                    backgroundColor: 'rgba(17, 24, 39, 0.9)',
                    callbacks: {
                        label: function(context) {
                            let label = context.label || '';
                            if (label) label += ': ';
                            if (context.parsed !== null) {
                                label += new Intl.NumberFormat('en-US', { style: 'currency', currency: 'USD' }).format(context.parsed);
                            }
                            return label;
                        }
                    }
                }
            }
        }
    });
}

function renderHistory(history, offlineHtml = '') {
    if (!history || history.length === 0) {
        if (!offlineHtml) {
            els.historyList.innerHTML = '<div class="loading-message">尚無結帳紀錄</div>';
        } else {
            els.historyList.innerHTML = offlineHtml + '<div class="loading-message">雲端尚無結帳紀錄</div>';
        }
        return;
    }
    
    const cloudHtml = history.map(record => {
        const isVoided = record.details.includes('[已作廢]');
        const voidBtnHtml = isVoided 
            ? `<span class="void-status">已作廢</span>`
            : `<button type="button" class="void-btn" onclick="executeVoidOrder('${record.timestamp}', this)">作廢</button>`;
            
        return `
            <div class="history-item ${isVoided ? 'is-voided' : ''}">
                <div class="history-item-header">
                    <span>時間：${record.timestamp}</span>
                    <div class="history-header-right">
                        ${voidBtnHtml}
                    </div>
                </div>
                <div class="history-item-total">總計：$${record.totalAmount}</div>
                <div class="history-item-details">${record.details}</div>
            </div>
        `;
    }).join('');
    
    els.historyList.innerHTML = offlineHtml + cloudHtml;
}

function executeVoidOrder(timestamp, btn) {
    if (!confirm('確定要作廢這筆訂單嗎？作廢後總金額將歸零，且無法復原。')) return;
    
    if (btn) {
        btn.disabled = true;
        btn.textContent = '處理中...';
    }
    
    if (typeof google === 'undefined') {
        setTimeout(() => {
            alert('作廢成功 (測試環境)');
            openHistoryModal(); // reload history
        }, 800);
        return;
    }
    
    google.script.run
        .withSuccessHandler((success) => {
            if (success) {
                alert('作廢成功');
                openHistoryModal(); // reload history
            } else {
                alert('作廢失敗：找不到該筆訂單');
                if (btn) {
                    btn.disabled = false;
                    btn.textContent = '作廢';
                }
            }
        })
        .withFailureHandler(err => {
            alert('作廢發生錯誤：' + err);
            if (btn) {
                btn.disabled = false;
                btn.textContent = '作廢';
            }
        })
        .voidOrder(timestamp);
}

function completeCheckout() {
    els.modalConfirmBtn.disabled = true;
    els.modalConfirmBtn.textContent = '處理中...';
    
    const originalTotal = getTotalAmount();
    const finalTotal = getDiscountedTotal();
    
    const items = state.cart.map(i => ({
        name: i.product.name,
        price: i.product.price,
        quantity: i.quantity,
        subtotal: i.product.price * i.quantity
    }));
    
    if (state.discount.type) {
        const discountDesc = state.discount.type === 'percent' 
            ? `(打 ${state.discount.value === 90 ? '9' : '8'} 折)` 
            : `(折讓 $${state.discount.value})`;
        const discountAmt = originalTotal - finalTotal;
        items.push({
            name: `[折扣] ${discountDesc}`,
            price: -discountAmt,
            quantity: 1,
            subtotal: -discountAmt
        });
    }
    
    const orderData = {
        timestamp: new Date().toLocaleString('zh-TW', { timeZone: 'Asia/Taipei' }),
        totalAmount: finalTotal,
        items: items,
        tenderedAmount: parseInt(els.tenderedAmount.value) || 0,
        changeAmount: (parseInt(els.tenderedAmount.value) || 0) - finalTotal
    };
    
    const onSuccess = (isOffline = false) => {
        if (isOffline) {
            alert('結帳完成！\n(目前離線，訂單已暫存，恢復連線後將自動同步)');
        } else {
            alert('結帳成功！');
        }
        els.modal.close();
        clearCart();
        els.tenderedAmount.value = '';
        els.modalConfirmBtn.disabled = false;
        els.modalConfirmBtn.textContent = '完成結帳';
    };
    
    if (typeof google === 'undefined') {
        setTimeout(() => {
            if (!navigator.onLine) {
                saveOfflineOrder(orderData);
                onSuccess(true);
            } else {
                alert('結帳成功 (測試環境)');
                onSuccess(false);
            }
        }, 1000);
        return;
    }
    
    if (!navigator.onLine) {
        // 直接離線儲存
        saveOfflineOrder(orderData);
        onSuccess(true);
        return;
    }
    
    google.script.run
        .withSuccessHandler(() => {
            onSuccess(false);
        })
        .withFailureHandler(err => {
            // 如果是在線上但伺服器錯誤/超時，我們也把它當離線存起來，以防店員卡住
            console.warn('伺服器回報錯誤或逾時，改為離線儲存:', err);
            saveOfflineOrder(orderData);
            onSuccess(true);
        })
        .submitOrder(orderData);
}

// 事件監聽綁定
function setupEventListeners() {
    // 數字鍵盤
    document.querySelectorAll('.numpad-btn').forEach(btn => {
        btn.addEventListener('click', () => {
            const key = btn.dataset.key;
            let currentVal = els.tenderedAmount.value;
            
            if (key === 'C') {
                els.tenderedAmount.value = '';
            } else if (key === 'BACK') {
                els.tenderedAmount.value = currentVal.slice(0, -1);
            } else {
                els.tenderedAmount.value = currentVal + key;
            }
            updateChange();
        });
    });

    // 點擊商品 (使用事件委派)
    els.productGrid.addEventListener('click', e => {
        const card = e.target.closest('.product-card');
        if (card) {
            addToCart(card.dataset.id);
        }
    });

    // 其他按鈕
    els.clearCartBtn.addEventListener('click', clearCart);
    els.checkoutBtn.addEventListener('click', openCheckoutModal);
    
    // 歷史紀錄按鈕
    els.historyBtn.addEventListener('click', openHistoryModal);
    els.closeHistoryBtn.addEventListener('click', () => els.historyModal.close());
    els.historyModal.addEventListener('click', (e) => {
        if (e.target === els.historyModal) els.historyModal.close();
    });
    
    // 報表按鈕
    els.reportBtn.addEventListener('click', openReportModal);
    els.closeReportBtn.addEventListener('click', () => els.reportModal.close());
    els.reportModal.addEventListener('click', (e) => {
        if (e.target === els.reportModal) els.reportModal.close();
    });
    
    // Modal 收現計算
    els.tenderedAmount.addEventListener('input', updateChange);
    
    // 快速金額按鈕
    els.quickBtns.forEach(btn => {
        btn.addEventListener('click', () => {
            const amount = btn.dataset.amount;
            if (amount === 'exact') {
                els.tenderedAmount.value = getDiscountedTotal();
            } else {
                const current = parseInt(els.tenderedAmount.value) || 0;
                els.tenderedAmount.value = current + parseInt(amount);
            }
            updateChange();
        });
    });

    // 折扣按鈕點擊
    els.discountBtns.forEach(btn => {
        if (btn.id === 'clear-discount-btn') return;
        btn.addEventListener('click', () => {
            state.discount = {
                type: btn.dataset.type,
                value: parseInt(btn.dataset.value)
            };
            updateDiscountUI();
            updateModalTotalDisplay();
        });
    });

    els.clearDiscountBtn.addEventListener('click', () => {
        state.discount = { type: null, value: 0 };
        updateDiscountUI();
        updateModalTotalDisplay();
    });

    // Dialog form submission handling
    els.modal.addEventListener('close', () => {
        if (els.modal.returnValue === 'confirm') {
            completeCheckout();
        }
        els.modal.returnValue = ''; // reset
    });

}

// 啟動應用
document.addEventListener('DOMContentLoaded', init);
</script>
