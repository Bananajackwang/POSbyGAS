<style>
    :root {
        /* Color Palette - Vibrant & Premium */
        --primary: #4F46E5;
        --primary-hover: #4338CA;
        --secondary: #10B981;
        --background: #F3F4F6;
        --surface: #FFFFFF;
        --surface-glass: rgba(255, 255, 255, 0.85);
        --text-main: #111827;
        --text-muted: #6B7280;
        --danger: #EF4444;
        --border: #E5E7EB;

        /* Layout & Spacing */
        --radius-lg: 16px;
        --radius-md: 12px;
        --radius-sm: 8px;
        --shadow-sm: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
        --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
        --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
        --shadow-glass: 0 8px 32px 0 rgba(31, 38, 135, 0.07);
    }

    * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
    }

    html, body {
        height: 100%;
        width: 100%;
        overflow: hidden;
    }

    body {
        font-family: 'Outfit', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        background-color: var(--background);
        color: var(--text-main);
        line-height: 1.5;
        /* Prevent pull-to-refresh on tablets */
        overscroll-behavior-y: none;
    }

    /* App Layout */
    .app-container {
        display: grid;
        /* Main area gets remaining space, sidebar is fixed width */
        grid-template-columns: 1fr 380px;
        grid-template-rows: auto 1fr;
        height: 100%;
        width: 100%;
        overflow: hidden;
    }

    /* --- Left Side: Main Content --- */
    .network-status {
        grid-column: 1 / -1;
        background: var(--danger);
        color: white;
        text-align: center;
        padding: 0.5rem;
        font-weight: 600;
        font-size: 0.9rem;
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 0.5rem;
        z-index: 50;
        transition: background 0.3s, height 0.3s;
    }

    .network-status.hidden {
        display: none;
    }

    .network-status.syncing {
        background: #F59E0B; /* Orange */
    }

    .network-status.online {
        background: var(--secondary); /* Green */
    }

    .offline-count {
        background: rgba(255, 255, 255, 0.2);
        padding: 0.1rem 0.5rem;
        border-radius: 12px;
        font-size: 0.8rem;
    }

    .main-content {
        display: flex;
        flex-direction: column;
        height: 100%;
        overflow: hidden;
    }

    .header {
        background: var(--surface-glass);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        padding: 1.5rem 2rem 1rem;
        border-block-end: 1px solid var(--border);
        z-index: 10;
        display: flex;
        justify-content: space-between;
        align-items: center;
    }

    .header h1 {
        font-size: 1.75rem;
        font-weight: 700;
        color: var(--primary);
    }

    .history-btn {
        background: var(--secondary);
        color: white;
        border: none;
        padding: 0.5rem 1rem;
        border-radius: var(--radius-sm);
        font-weight: 600;
        cursor: pointer;
        transition: background 0.2s;
    }

    .history-btn:hover {
        background: #059669;
    }

    /* Category header in grid */
    .category-header {
        grid-column: 1 / -1;
        margin-block-start: 1rem;
        border-block-end: 2px solid var(--primary);
        padding-block-end: 0.5rem;
    }

    .category-header h3 {
        font-size: 1.25rem;
        color: var(--primary);
    }

    .product-grid {
        flex: 1;
        overflow-y: auto;
        padding: 1.5rem;
        display: grid;
        /* Smaller cards for more density */
        grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
        gap: 1rem;
        align-content: start;
        scrollbar-gutter: stable;
        -webkit-overflow-scrolling: touch;
        min-block-size: 0;
    }

    /* Product Card */
    .product-card {
        background: var(--surface);
        border-radius: var(--radius-md);
        padding: 1rem;
        border: 1px solid var(--border);
        box-shadow: var(--shadow-sm);
        cursor: pointer;
        transition: transform 0.2s cubic-bezier(0.34, 1.56, 0.64, 1), box-shadow 0.2s ease;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 0.5rem;
        user-select: none;
        -webkit-user-select: none;
    }

    .product-card:active {
        transform: scale(0.95);
    }

    .product-card:hover {
        transform: translateY(-4px);
        box-shadow: var(--shadow-md);
        border-color: var(--primary);
    }

    .product-name {
        font-size: 1.1rem;
        font-weight: 600;
        text-align: center;
    }

    .product-price {
        font-size: 1.1rem;
        color: var(--secondary);
        font-weight: 700;
    }

    /* --- Right Side: Cart Sidebar --- */
    .cart-sidebar {
        background: var(--surface);
        border-inline-start: 1px solid var(--border);
        display: flex;
        flex-direction: column;
        height: 100%;
        box-shadow: var(--shadow-lg);
        z-index: 20;
        overflow: hidden;
    }

    .cart-header {
        padding: 1.5rem;
        border-block-end: 1px solid var(--border);
        display: flex;
        justify-content: space-between;
        align-items: center;
    }

    .cart-header h2 {
        font-size: 1.5rem;
        font-weight: 700;
    }

    .clear-cart-btn {
        background: rgba(239, 68, 68, 0.1);
        color: var(--danger);
        border: none;
        padding: 0.5rem 1rem;
        border-radius: var(--radius-sm);
        font-weight: 600;
        cursor: pointer;
        transition: background 0.2s;
    }

    .clear-cart-btn:hover {
        background: rgba(239, 68, 68, 0.2);
    }

    .cart-items {
        flex: 1;
        overflow-y: auto;
        padding: 1.5rem;
        display: flex;
        flex-direction: column;
        gap: 1rem;
        min-block-size: 0;
    }

    .empty-cart-message {
        text-align: center;
        color: var(--text-muted);
        margin-block-start: 2rem;
        font-style: italic;
    }

    /* Cart Item */
    .cart-item {
        display: grid;
        grid-template-columns: 1fr auto;
        grid-template-areas:
            "name name"
            "price actions";
        gap: 0.5rem;
        padding: 1rem;
        background: var(--background);
        border-radius: var(--radius-md);
        border: 1px solid var(--border);
    }

    .cart-item-name {
        grid-area: name;
        font-weight: 600;
        font-size: 1.1rem;
    }

    .cart-item-price {
        grid-area: price;
        color: var(--text-muted);
        display: flex;
        align-items: center;
    }

    .cart-item-actions {
        grid-area: actions;
        display: flex;
        align-items: center;
        gap: 0.75rem;
        background: var(--surface);
        padding: 0.25rem;
        border-radius: var(--radius-sm);
        border: 1px solid var(--border);
    }

    .qty-btn {
        background: transparent;
        border: none;
        width: 28px;
        height: 28px;
        border-radius: 4px;
        font-size: 1.2rem;
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        transition: background 0.2s;
    }

    .qty-btn:hover {
        background: var(--background);
    }

    .qty-btn.remove {
        color: var(--danger);
    }

    .item-qty {
        font-weight: 700;
        min-width: 20px;
        text-align: center;
    }

    /* Cart Footer */
    .cart-footer {
        padding: 1.5rem;
        border-block-start: 1px solid var(--border);
        background: var(--surface-glass);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
    }

    .staff-selection {
        margin-block-end: 1.5rem;
    }

    .staff-selection h3 {
        font-size: 0.9rem;
        text-transform: uppercase;
        color: var(--text-muted);
        letter-spacing: 0.05em;
        margin-block-end: 0.75rem;
    }

    .staff-buttons {
        display: flex;
        flex-wrap: wrap;
        gap: 0.5rem;
    }

    .staff-btn {
        background: var(--background);
        border: 1px solid var(--border);
        padding: 0.5rem 1rem;
        border-radius: 20px;
        font-weight: 500;
        cursor: pointer;
        transition: all 0.2s;
    }

    .staff-btn.active {
        background: var(--primary);
        color: white;
        border-color: var(--primary);
        box-shadow: 0 2px 8px rgba(79, 70, 229, 0.4);
    }

    .total-section {
        display: flex;
        justify-content: space-between;
        align-items: center;
        font-size: 1.25rem;
        font-weight: 600;
        margin-block-end: 1.5rem;
    }

    .total-amount {
        font-size: 2rem;
        font-weight: 700;
        color: var(--primary);
    }

    .checkout-btn {
        width: 100%;
        padding: 1rem;
        background: var(--primary);
        color: white;
        border: none;
        border-radius: var(--radius-lg);
        font-size: 1.25rem;
        font-weight: 700;
        cursor: pointer;
        transition: background 0.2s, transform 0.1s;
        box-shadow: 0 4px 12px rgba(79, 70, 229, 0.3);
    }

    .checkout-btn:hover:not(:disabled) {
        background: var(--primary-hover);
        transform: translateY(-2px);
    }

    .checkout-btn:active:not(:disabled) {
        transform: translateY(0);
    }

    .checkout-btn:disabled {
        background: var(--border);
        color: var(--text-muted);
        cursor: not-allowed;
        box-shadow: none;
    }

    /* --- Modal --- */
    .modal {
        margin: auto;
        padding: 1.5rem;
        border: none;
        border-radius: var(--radius-lg);
        box-shadow: var(--shadow-lg);
        background: var(--surface);
        color: var(--text-main);
        max-width: 90vw;
        width: 450px;
    }

    .modal::backdrop {
        background: rgba(0, 0, 0, 0.5);
        backdrop-filter: blur(4px);
        -webkit-backdrop-filter: blur(4px);
    }

    .modal h2 {
        font-size: 1.5rem;
        margin-block-end: 1rem;
        text-align: center;
    }

    .checkout-details {
        background: var(--background);
        padding: 0.75rem;
        border-radius: var(--radius-md);
        margin-block-end: 1rem;
    }

    .detail-row {
        display: flex;
        justify-content: space-between;
        padding-block: 0.5rem;
        font-size: 1.1rem;
    }

    .total-row {
        border-block-start: 1px dashed var(--border);
        margin-block-start: 0.5rem;
        padding-block-start: 1rem;
        font-weight: 700;
        font-size: 1.25rem;
    }

    .highlight-text {
        font-weight: 600;
        color: var(--primary);
    }

    .highlight-total {
        color: var(--danger);
        font-size: 1.5rem;
    }

    .discount-section {
        display: flex;
        flex-wrap: wrap;
        gap: 0.5rem;
        margin-block-start: 1rem;
        padding-block-start: 1rem;
        border-block-start: 1px dashed var(--border);
    }

    .discount-btn {
        padding: 0.5rem 1rem;
        border: 1px solid var(--primary);
        background: transparent;
        color: var(--primary);
        border-radius: var(--radius-md);
        font-weight: 600;
        cursor: pointer;
        transition: all 0.2s;
    }

    .discount-btn:hover {
        background: var(--primary-light);
    }

    .discount-btn.active {
        background: var(--primary);
        color: white;
    }

    .discount-clear {
        border-color: var(--text-muted);
        color: var(--text-muted);
    }

    .discount-clear:hover {
        background: var(--border);
        color: var(--text-main);
    }

    .payment-section {
        margin-block-end: 1rem;
    }

    .payment-section label {
        display: block;
        font-weight: 600;
        margin-block-end: 0.5rem;
    }

    .input-group {
        position: relative;
        display: flex;
        align-items: center;
        margin-block-end: 1rem;
    }

    .currency-symbol {
        position: absolute;
        inset-inline-start: 1rem;
        font-size: 1.5rem;
        font-weight: 600;
        color: var(--text-muted);
    }

    #tendered-amount {
        width: 100%;
        padding: 0.75rem 1rem 0.75rem 2.5rem;
        font-size: 1.5rem;
        font-weight: 700;
        border: 2px solid var(--border);
        border-radius: var(--radius-md);
        outline: none;
        transition: border-color 0.2s;
        font-family: inherit;
        /* Prevent iOS Safari styling */
        -webkit-appearance: none;
        appearance: none;
    }

    #tendered-amount:focus {
        border-color: var(--primary);
    }

    .numpad-container {
        display: flex;
        gap: 1rem;
    }

    .numpad {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 0.5rem;
        flex: 1;
    }

    .numpad-btn {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: var(--radius-sm);
        padding: 0.75rem 0;
        font-size: 1.25rem;
        font-weight: 600;
        cursor: pointer;
        transition: background 0.2s, box-shadow 0.2s;
        box-shadow: var(--shadow-sm);
    }

    .numpad-btn:hover {
        background: var(--background);
    }

    .numpad-btn:active {
        transform: translateY(1px);
        box-shadow: none;
    }

    .numpad-clear {
        color: var(--danger);
        font-size: 1.1rem;
    }

    .numpad-back {
        color: var(--text-muted);
    }

    .quick-amounts-vertical {
        display: flex;
        flex-direction: column;
        gap: 0.5rem;
        width: 100px;
    }

    .quick-btn {
        background: var(--background);
        border: 1px solid var(--border);
        padding: 0.75rem 0;
        border-radius: var(--radius-sm);
        font-weight: 600;
        cursor: pointer;
        transition: background 0.2s;
    }

    .quick-btn:hover {
        background: var(--border);
    }

    .change-section {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 0.75rem 1rem;
        background: rgba(16, 185, 129, 0.1);
        border-radius: var(--radius-md);
        margin-block-end: 1rem;
        font-size: 1.25rem;
        font-weight: 700;
    }

    .change-amount {
        color: var(--secondary);
        font-size: 1.75rem;
    }

    .change-amount.negative {
        color: var(--danger);
    }

    .modal-actions {
        display: flex;
        gap: 1rem;
    }

    .modal-actions button {
        flex: 1;
        padding: 0.75rem;
        border: none;
        border-radius: var(--radius-md);
        font-size: 1.1rem;
        font-weight: 600;
        cursor: pointer;
        transition: opacity 0.2s;
    }

    .cancel-btn {
        background: var(--background);
        color: var(--text-main);
    }

    .confirm-btn {
        background: var(--primary);
        color: white;
    }

    .confirm-btn:disabled {
        background: var(--border);
        color: var(--text-muted);
        cursor: not-allowed;
    }

    .cancel-btn:hover,
    .confirm-btn:hover:not(:disabled) {
        opacity: 0.9;
    }

    /* --- History Modal --- */
    .history-modal {
        width: 600px;
        max-width: 90vw;
        height: 85vh; /* iOS Safari fallback to prevent collapse */
        max-height: 85vh;
        box-sizing: border-box;
    }

    .history-modal .modal-content {
        display: flex;
        flex-direction: column;
        height: 100%;
    }

    .history-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        border-block-end: 1px solid var(--border);
        padding-block-end: 1rem;
        margin-block-end: 1rem;
    }

    .history-header h2 {
        margin-block-end: 0;
        text-align: left;
    }

    .close-history-btn {
        background: transparent;
        border: none;
        font-size: 1.5rem;
        cursor: pointer;
        color: var(--text-muted);
    }

    .history-list {
        flex: 1 1 auto;
        overflow-y: auto;
        display: flex;
        flex-direction: column;
        gap: 1rem;
        padding-block-end: 1rem;
        -webkit-overflow-scrolling: touch;
    }

    .history-item {
        background: var(--background);
        border: 1px solid var(--border);
        border-radius: var(--radius-md);
        padding: 1rem;
    }

    .history-item-header {
        display: flex;
        justify-content: space-between;
        margin-block-end: 0.5rem;
        font-size: 0.9rem;
        color: var(--text-muted);
    }

    .history-item-total {
        font-size: 1.25rem;
        font-weight: 700;
        color: var(--primary);
        margin-block-end: 0.5rem;
    }

    .history-item-details {
        font-size: 1rem;
        white-space: pre-wrap;
        line-height: 1.4;
    }

    .loading-message {
        text-align: center;
        color: var(--text-muted);
        font-style: italic;
        padding: 2rem;
    }

    /* --- Void Order Styles --- */
    .history-header-right {
        display: flex;
        align-items: center;
        gap: 0.75rem;
    }

    .void-btn {
        background: var(--danger);
        color: white;
        border: none;
        padding: 0.25rem 0.5rem;
        border-radius: var(--radius-sm);
        font-size: 0.75rem;
        font-weight: 600;
        cursor: pointer;
        transition: opacity 0.2s;
    }

    .void-btn:hover:not(:disabled) {
        opacity: 0.8;
    }

    .void-btn:disabled {
        background: var(--text-muted);
        cursor: not-allowed;
    }

    .void-status {
        background: var(--border);
        color: var(--text-muted);
        padding: 0.25rem 0.5rem;
        border-radius: var(--radius-sm);
        font-size: 0.75rem;
        font-weight: 600;
    }

    .is-voided {
        opacity: 0.6;
        background: var(--surface);
    }

    .is-voided .history-item-total {
        text-decoration: line-through;
        color: var(--text-muted);
    }

    /* --- Report Modal --- */
    .report-modal {
        width: 90vw;
        max-width: 1000px;
        height: 90vh;
        max-height: 90vh;
        background: #111827; /* Dark elegant theme for report */
        color: #F3F4F6;
        border-radius: var(--radius-lg);
        border: 1px solid rgba(255, 255, 255, 0.1);
        padding: 0;
        overflow: hidden;
    }

    .report-modal::backdrop {
        background: rgba(0, 0, 0, 0.7);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
    }

    .report-modal .modal-content {
        display: flex;
        flex-direction: column;
        height: 100%;
        padding: 1.5rem;
        background: transparent;
    }

    .report-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-block-end: 1.5rem;
        border-block-end: 1px solid rgba(255, 255, 255, 0.1);
        padding-block-end: 1rem;
    }

    .report-header h2 {
        margin: 0;
        font-size: 1.75rem;
        color: #FFFFFF;
        text-align: left;
    }

    .report-date {
        color: #9CA3AF;
        font-size: 1rem;
        margin-top: 0.25rem;
    }

    .close-report-btn {
        background: transparent;
        border: none;
        font-size: 1.5rem;
        cursor: pointer;
        color: #9CA3AF;
        transition: color 0.2s;
    }

    .close-report-btn:hover {
        color: #FFFFFF;
    }

    .report-body {
        flex: 1;
        overflow-y: auto;
        /* Custom scrollbar for dark mode */
        scrollbar-color: rgba(255, 255, 255, 0.2) transparent;
        scrollbar-width: thin;
    }

    .report-dashboard {
        display: flex;
        flex-direction: column;
        gap: 1.5rem;
    }
    
    .report-dashboard.hidden {
        display: none;
    }

    .kpi-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
        gap: 1.5rem;
    }

    .kpi-card {
        background: rgba(255, 255, 255, 0.05);
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: var(--radius-md);
        padding: 1.5rem;
        display: flex;
        flex-direction: column;
        gap: 0.5rem;
        box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        backdrop-filter: blur(10px);
        -webkit-backdrop-filter: blur(10px);
    }

    .kpi-title {
        font-size: 0.85rem;
        text-transform: uppercase;
        color: #9CA3AF;
        letter-spacing: 0.05em;
    }

    .kpi-value {
        font-size: 2.25rem;
        font-weight: 700;
        color: #FFFFFF;
    }

    .kpi-value.highlight-total {
        color: #38BDF8; /* Light blue */
    }

    .chart-container {
        background: rgba(255, 255, 255, 0.05);
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: var(--radius-md);
        padding: 1.5rem;
        box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
    }

    .chart-container h3 {
        font-size: 1rem;
        color: #D1D5DB;
        margin-block-end: 1rem;
        font-weight: 600;
        text-transform: uppercase;
    }

    .bottom-charts-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 1.5rem;
    }

    /* Top Items List Styling */
    .top-items-list {
        display: flex;
        flex-direction: column;
        gap: 0.75rem;
    }

    .top-item-row {
        display: grid;
        grid-template-columns: 2fr 1fr 1fr;
        align-items: center;
        padding: 0.5rem 0;
        border-block-end: 1px dashed rgba(255, 255, 255, 0.05);
    }

    .top-item-row:last-child {
        border-block-end: none;
    }

    .top-item-name {
        font-weight: 500;
        color: #F3F4F6;
    }

    .top-item-qty {
        text-align: right;
        color: #9CA3AF;
    }

    .top-item-sales {
        text-align: right;
        font-weight: 600;
        color: #34D399; /* Emerald */
    }

    /* Header Actions */
    .header-actions {
        display: flex;
        gap: 0.75rem;
    }
